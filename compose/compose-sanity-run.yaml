#
# Docker Compose for sanity testing ALL OS participants before release.
# Reuses compose.postgres.yml for the database service.
#
# Usage:
#   source export-ports.sh && source get-versions.sh [--local|--version <ver>]
#   docker compose -f compose-sanity-run.yaml up -d --wait
#   docker compose -f compose-sanity-run.yaml ps
#   # Verify all services are healthy, then:
#   docker compose -f compose-sanity-run.yaml down
#

include:
  - compose.postgres.yml

services:

  kafka:
    image: nexus3.onap.org:10001/confluentinc/cp-kafka:7.7.7
    container_name: kafka
    hostname: kafka
    ports:
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: "kafka-topics --bootstrap-server kafka:29092 --list || exit 1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  init-kafka:
    image: nexus3.onap.org:10001/confluentinc/cp-kafka:7.7.7
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    command: "bash -c 'sh /home/appuser/create-topic.sh'"
    volumes:
      - ./config/kafka/create-topic.sh:/home/appuser/create-topic.sh

  jaeger:
    image: nexus3.onap.org:10001/jaegertracing/all-in-one:1.76.0
    container_name: jaeger
    hostname: jaeger
    ports:
      - 16686:16686
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: "wget -q -O - http://localhost:14269/ || exit 1"
      interval: 5s
      timeout: 5s
      retries: 6

  # ==================== ACM Runtime ====================
  policy-clamp-runtime-acm:
    image: ${CONTAINER_LOCATION}onap/policy-clamp-runtime-acm:${POLICY_CLAMP_VERSION}
    hostname: policy-clamp-runtime-acm
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    ports:
      - ${ACM_PORT:-30007}:6969
    environment:
      RUNTIME_USER: runtimeUser
      RUNTIME_PASSWORD: zb!XztG34
      TIMEZONE: UTC
      SQL_HOST: postgres
      SQL_PORT: 5432
      SQL_USER: policy_user
      SQL_PASSWORD: policy_user
      KAFKA_ALLOW_AUTO_CREATE_TOPICS: false
      ALLOW_TRACING: true
      PROMETHEUS_PORT: 6969
      OTEL_SERVICE_NAME: acm-r
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_JAVA_GLOBAL_AUTOCONFIGURE_ENABLED: true
      OTEL_METRICS_EXPORTER: none
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_LOCATION: /opt/app/policy/clamp/etc/application.yaml
      LOGGING_CONFIG: /opt/app/policy/clamp/etc/logback.xml
    volumes:
      - ../runtime-acm/src/main/resources/application.yaml:/opt/app/policy/clamp/etc/application.yaml:ro
      - ../runtime-acm/src/main/resources/logback.xml:/opt/app/policy/clamp/etc/logback.xml:ro
    entrypoint: java -jar /app/app.jar
    healthcheck:
      test: "curl --fail --silent --user 'runtimeUser:zb!XztG34' http://localhost:6969/onap/policy/clamp/acm/actuator/health/readiness | grep -q UP || exit 1"
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ==================== HTTP Participant ====================
  policy-clamp-ac-http-ppnt:
    image: ${CONTAINER_LOCATION}onap/policy-clamp-ac-http-ppnt:${POLICY_CLAMP_PPNT_VERSION}
    hostname: policy-clamp-ac-http-ppnt
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      HTTP_USER: participantUser
      HTTP_PASSWORD: zb!XztG34
      topicCommInfrastructure: kafka
      TOPIC_VALIDATION: true
      allowTracing: true
      OTEL_SERVICE_NAME: http-ppnt
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_JAVA_GLOBAL_AUTOCONFIGURE_ENABLED: true
      OTEL_METRICS_EXPORTER: none
