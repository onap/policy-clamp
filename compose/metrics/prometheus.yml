# global config
global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      # - alertmanager:9093

# scrape config
scrape_configs:

- job_name: "acm-sim-metrics"
  metrics_path: "/onap/policy/simparticipant/prometheus"
  static_configs:
  - targets:
    - "policy-clamp-ac-sim-ppnt-1:6969"
    - "policy-clamp-ac-sim-ppnt-2:6969"
    - "policy-clamp-ac-sim-ppnt-3:6969"
  basic_auth:
    username: "participantUser"
    password: "zb!XztG34"

- job_name: "acm-http-metrics"
  metrics_path: "onap/policy/clamp/acm/httpparticipant/prometheus"
  static_configs:
  - targets:
    - "compose-policy-clamp-ac-http-ppnt-1:6969"
    - "compose-policy-clamp-ac-http-ppnt-2:6969"
  basic_auth:
    username: "participantUser"
    password: "zb!XztG34"

- job_name: "acm-metrics"
  metrics_path: "/onap/policy/clamp/acm/actuator/prometheus"
  static_configs:
  - targets:
    - "compose-policy-clamp-runtime-acm-1:6969"
    - "compose-policy-clamp-runtime-acm-2:6969"
  basic_auth:
    username: "runtimeUser"
    password: "zb!XztG34"
