apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: acm
spec:
  kafka:
    version: 3.9.0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    authorization:
      type: simple
    livenessProbe:
      initialDelaySeconds: 40
      timeoutSeconds: 5
    readinessProbe:
      initialDelaySeconds: 40
      timeoutSeconds: 5
    config:
      auto.create.topics.enable: false
      allow.everyone.if.no.acl.found: true
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.9"
    resources:
      limits:
        cpu: 1
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 512Mi
    storage:
      type: ephemeral
  zookeeper:
    replicas: 1
    livenessProbe:
      initialDelaySeconds: 40
      timeoutSeconds: 5
    readinessProbe:
      initialDelaySeconds: 40
      timeoutSeconds: 5
    storage:
      type: ephemeral
    config:
      ssl.hostnameVerification: false
      ssl.quorum.hostnameVerification: false
      sslQuorum: false
      quorumListenOnAllIPs: true
    resources:
      limits:
        cpu: 1
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 512Mi
  entityOperator:
    topicOperator:
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
    userOperator:
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: policy-acruntime-participant
  labels:
    strimzi.io/cluster: acm
spec:
  partitions: 10
  config:
    retention.ms: 1200000
    segment.bytes: 1073741824
    retention.bytes: 1073741824
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: acm-ppnt-sync
  labels:
    strimzi.io/cluster: acm
spec:
  partitions: 10
  config:
    retention.ms: 1200000
    segment.bytes: 1073741824
    retention.bytes: 1073741824
